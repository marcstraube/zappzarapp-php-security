name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
      deps: ${{ steps.filter.outputs.deps }}
      release-please: ${{ steps.release.outputs.match }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            source:
              - 'src/**'
              - 'tests/**'
            deps:
              - 'composer.json'
              - 'composer.lock'

      - name: Check for release-please branch
        id: release
        run: |
          if [[ "${{ github.head_ref }}" == release-please--* ]]; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

  security-analysis:
    name: Security Analysis (Psalm Taint)
    needs: changes
    if: >-
      needs.changes.outputs.release-please != 'true' &&
      (needs.changes.outputs.source == 'true' ||
       needs.changes.outputs.deps == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run Psalm Taint Analysis
        run: vendor/bin/psalm --taint-analysis

  tests:
    name: PHP ${{ matrix.php }} Tests
    needs: changes
    if: >-
      needs.changes.outputs.release-please != 'true' &&
      (needs.changes.outputs.source == 'true' ||
       needs.changes.outputs.deps == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Security audit
        run: composer audit --no-dev

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse

      - name: Run Psalm
        run: vendor/bin/psalm --show-info=false

      - name: Run PHPMD
        run: vendor/bin/phpmd src,tests text phpmd.xml

      - name: Run Rector
        run: vendor/bin/rector process --dry-run

      - name: Check code style
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Run tests with coverage
        run: vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml --coverage-xml=build/coverage/coverage-xml --log-junit=build/coverage/junit.xml

      - name: Run Deptrac
        run: vendor/bin/deptrac analyse

      - name: Run Infection
        run: vendor/bin/infection --threads=4 --coverage=build/coverage --skip-initial-tests --min-msi=100 --min-covered-msi=100 --logger-github

      - name: Generate SBOM
        run: composer sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-php${{ matrix.php }}
          path: sbom.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # =============================================================================
  # CI GATE (single required check for branch protection)
  # =============================================================================
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, security-analysis, tests]
    steps:
      - name: Check required job results
        run: |
          results=(
            "${{ needs.security-analysis.result }}"
            "${{ needs.tests.result }}"
          )
          for r in "${results[@]}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::Required job failed or was cancelled: $r"
              exit 1
            fi
          done
          echo "All required jobs passed."
