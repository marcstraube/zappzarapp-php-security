name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your use case below.

  - type: input
    id: module
    attributes:
      label: Module
      description: Which module does this relate to? Leave empty for new modules.
      placeholder: "e.g. CSP, CSRF, Password, Sanitization, Headers, Cookie, RateLimiting, SRI, Logging"

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work? Code examples are welcome.
      render: php

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?
